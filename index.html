<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Budget Tracker"/>
<meta name="theme-color" content="#6c3fc5"/>
<meta name="description" content="Personal budget tracker"/>
<link rel="manifest" href="manifest.json"/>
<!-- iOS splash / icons - GitHub Pages will serve from same folder -->
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f0edf8;
  --surface:#ffffff;
  --surface2:#f7f5fc;
  --border:#e4ddf5;
  --border2:#cdc3ed;
  --text:#1a1035;--text2:#4a3f6e;--text3:#8677b0;--text4:#b8aed4;
  --purple:#6c3fc5;--purple2:#8b5cf6;--purple-light:#ede9fb;
  --green:#10b981;--red:#ef4444;--blue:#3b82f6;--teal:#06b6d4;--gold:#f59e0b;
  --grad:linear-gradient(135deg,#6c3fc5 0%,#9333ea 100%);
  --bpi:#b91c1c;--rcbc:#87CEEB;--ub:#FFA500;--maya:#00FF00;--mari:#FFD580;--cash:#64748b;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.header{background:var(--grad);padding:14px 16px 0;flex-shrink:0;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);}
.header::after{content:'';position:absolute;top:20px;right:20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05);}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:relative;z-index:1;}
.logo{font-weight:800;font-size:20px;color:#fff;letter-spacing:-0.03em;}
.logo span{opacity:.75;}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);border-radius:20px;color:#fff;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif;}
.icon-btn:active{background:rgba(255,255,255,.25);}
.income-row{display:flex;gap:8px;margin-bottom:8px;position:relative;z-index:1;}
.income-row.hidden{display:none;}
.income-box{flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:8px 12px;}
.income-label{font-size:10px;color:rgba(255,255,255,.65);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.income-input{width:100%;background:transparent;border:none;color:#fff;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;margin-top:2px;outline:none;}
.income-input::placeholder{color:rgba(255,255,255,.4);}
.year-select{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;color:#fff;padding:3px 10px;font-size:13px;font-weight:800;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;letter-spacing:-0.02em;}
.year-select option{background:#6c3fc5;color:#fff;}
.settings-overlay{position:fixed;inset:0;background:rgba(26,16,53,.45);z-index:200;display:flex;align-items:flex-start;justify-content:flex-end;backdrop-filter:blur(2px);padding-top:56px;padding-right:12px;}
.settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:220px;box-shadow:0 8px 32px rgba(108,63,197,.18);overflow:hidden;}
.settings-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);font-weight:800;font-size:13px;color:var(--text);}
.settings-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px;font-weight:600;color:var(--text2);transition:background .15s;}
.settings-item:last-child{border-bottom:none;}
.settings-item:active{background:var(--surface2);}
.settings-item-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
.settings-item-label{flex:1;}
.settings-btn{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);border-radius:20px;color:#fff;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all .2s;flex-shrink:0;}
.settings-btn:active{background:rgba(255,255,255,.3);}
.month-bar{background:var(--grad);padding:0 12px 12px;overflow-x:auto;flex-shrink:0;white-space:nowrap;scrollbar-width:none;position:relative;z-index:1;}
.month-bar::-webkit-scrollbar{display:none;}
.month-bar-inner{display:inline-flex;gap:6px;}
.month-chip{display:inline-block;padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:0.04em;transition:all .2s;}
.month-chip.active{background:#fff;color:var(--purple);border-color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.15);}
.nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;scrollbar-width:none;box-shadow:0 1px 4px rgba(108,63,197,.06);}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{flex-shrink:0;padding:11px 14px;border:none;background:none;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-btn.active{color:var(--purple);border-bottom-color:var(--purple);}
.content{flex:1;overflow-y:auto;padding:14px 12px;scrollbar-width:thin;scrollbar-color:#e4ddf5 transparent;background:var(--bg);}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:#cdc3ed;border-radius:2px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(108,63,197,.05);}
.card-title{font-weight:800;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:12px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-grid.three{grid-template-columns:1fr 1fr 1fr;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;box-shadow:0 2px 8px rgba(108,63,197,.04);}
.stat-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.stat-value{font-size:15px;font-weight:800;}
.stat-sub{font-size:10px;color:var(--text4);margin-top:3px;}
.budget-bar{margin-bottom:10px;}
.budget-bar-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:11px;}
.budget-bar-label span:first-child{color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.budget-bar-label span:last-child{color:var(--text);font-weight:700;}
.bar-track{height:6px;background:var(--bg);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.bank-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.bank-dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.bank-name{font-weight:600;font-size:12px;color:var(--text2);display:flex;align-items:center;}
.bank-amount{font-weight:700;color:var(--text);font-size:13px;}
.breakdown-grid{display:flex;flex-direction:column;gap:10px;}
.breakdown-section{font-size:11px;}
.breakdown-head{display:flex;justify-content:space-between;align-items:center;color:var(--text3);font-weight:800;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:7px;}
.breakdown-head-label{letter-spacing:0.06em;}
.breakdown-head span{color:var(--purple);font-size:13px;}
.breakdown-rows{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;}
.breakdown-row{display:flex;justify-content:space-between;gap:6px;padding:2px 0;}
.breakdown-row span:first-child{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.breakdown-row span:last-child{color:var(--text);font-weight:700;white-space:nowrap;flex-shrink:0;}
.expense-list{display:flex;flex-direction:column;gap:8px;}
.expense-item{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;box-shadow:0 1px 4px rgba(108,63,197,.04);transition:opacity .2s;}
.expense-item.red-item .expense-name{color:var(--red);}
.expense-header{display:flex;justify-content:space-between;align-items:flex-start;}
.expense-name{font-size:13px;font-weight:600;color:var(--text);}
.expense-amount{font-size:16px;font-weight:800;color:var(--purple);}
.expense-amount.zero{color:var(--text4);font-size:12px;font-weight:500;}
.expense-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;color:#fff;}
.due-tag{font-size:10px;color:var(--text3);font-weight:500;}
.via-tag{font-size:10px;color:var(--text4);}
.section-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.section-title{font-weight:800;font-size:17px;color:var(--text);}
.section-meta{font-size:11px;color:var(--text3);}
.paid-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.paid-toggle input[type=checkbox]{width:17px;height:17px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.paid-label{font-size:11px;color:var(--text3);}
.paid-label.checked{color:var(--green);text-decoration:line-through;opacity:.7;}
.paid-summary{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.15);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#059669;display:flex;justify-content:space-between;align-items:center;font-weight:600;}
.paid-count{font-weight:800;font-size:13px;color:var(--green);}
.sub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sub-card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:12px;}
.sub-name{font-weight:800;font-size:13px;color:var(--text);margin-bottom:3px;}
.sub-amount{font-size:18px;font-weight:800;color:var(--teal);}
.sub-per{font-size:10px;color:var(--text4);font-weight:500;}
.sub-annual{font-size:10px;color:var(--text4);margin-top:3px;}
.sub-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 8px;font-size:12px;text-align:right;outline:none;margin-top:5px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;}
.sub-input:focus{border-color:var(--purple);}
.amt-cell{cursor:pointer;border-bottom:2px dashed var(--border2);padding-bottom:1px;}
.amt-edit{width:100px;background:var(--surface);border:2px solid var(--purple);border-radius:6px;color:var(--purple);padding:3px 6px;font-size:13px;font-weight:700;text-align:right;outline:none;font-family:'Plus Jakarta Sans',sans-serif;}
.total-bar{background:var(--purple-light);border:1px solid rgba(108,63,197,.15);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.total-bar-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
.total-bar-value{font-size:18px;font-weight:800;color:var(--purple);}
.item-actions{display:flex;gap:6px;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);}
.item-action-btn{flex:1;padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;cursor:pointer;transition:all .2s;text-align:center;}
.item-action-btn:active{background:var(--border);}
.item-action-btn.edit{color:var(--blue);border-color:rgba(59,130,246,.25);background:rgba(59,130,246,.05);}
.item-action-btn.delete{color:var(--red);border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.05);}
.item-action-btn.paid-btn{color:var(--green);border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.05);}
.item-action-btn.paid-btn.active{background:rgba(16,185,129,.12);}
.add-btn{width:100%;padding:12px;border-radius:12px;border:2px dashed var(--border2);background:transparent;color:var(--purple);font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;margin-top:8px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.add-btn:active{background:var(--purple-light);}
.modal-overlay{position:fixed;inset:0;background:rgba(26,16,53,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-weight:800;font-size:18px;color:var(--text);margin-bottom:16px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;display:block;}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;outline:none;}
.form-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(108,63,197,.1);}
.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px 12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:500;outline:none;appearance:none;}
.form-select:focus{border-color:var(--purple);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-primary{flex:1;padding:13px;border-radius:12px;border:none;background:var(--grad);color:#fff;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(108,63,197,.35);}
.btn-secondary{flex:1;padding:13px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;}
.amt-mode-row{display:flex;gap:6px;margin-bottom:12px;}
.amt-mode-btn{flex:1;padding:8px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .2s;}
.amt-mode-btn.active{background:var(--purple-light);border-color:var(--purple);color:var(--purple);}
.months-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:6px;}
.month-toggle{padding:5px 2px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:10px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;}
.month-toggle.on{background:var(--purple-light);border-color:var(--purple);color:var(--purple);}
.hint{background:rgba(108,63,197,.06);border:1px solid rgba(108,63,197,.12);border-radius:10px;padding:9px 12px;font-size:11px;color:var(--purple);margin-top:8px;font-weight:500;}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{border-collapse:collapse;width:100%;font-size:12px;}
th{padding:7px 9px;text-align:right;font-weight:800;font-size:10px;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);border-bottom:2px solid var(--border);}
th:first-child{text-align:left;}
td{padding:5px 9px;text-align:right;border-bottom:1px solid var(--border);}
td:first-child{text-align:left;color:var(--text);font-weight:600;}
tfoot td{border-top:2px solid var(--border);font-weight:800;color:var(--purple);}
.separator{border:none;border-top:1px solid var(--border);margin:10px 0;}
.consistent-badge{font-size:10px;color:var(--teal);font-weight:700;background:rgba(6,182,212,.08);border:1px solid rgba(6,182,212,.2);border-radius:4px;padding:1px 5px;margin-left:4px;}
.autocalc-badge{font-size:10px;color:var(--gold);font-weight:700;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:4px;padding:1px 5px;margin-left:4px;}
.cc-summary-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;padding:7px 10px;margin-top:8px;background:rgba(108,63,197,.06);border:1px solid rgba(108,63,197,.15);border-radius:9px;cursor:pointer;font-size:11px;font-weight:700;color:var(--purple);font-family:'Plus Jakarta Sans',sans-serif;text-align:left;}
.cc-summary-toggle:active{background:rgba(108,63,197,.12);}
.cc-summary-toggle .chevron{transition:transform .25s;display:inline-block;font-style:normal;}
.cc-summary-panel{display:none;margin-top:6px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.cc-summary-panel.open{display:block;}
.cc-summary-section{padding:8px 10px;border-bottom:1px solid var(--border);}
.cc-summary-section:last-child{border-bottom:none;}
.cc-summary-section-head{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;justify-content:space-between;}
.cc-summary-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;}
.cc-summary-row span:first-child{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-summary-row span:last-child{font-weight:700;color:var(--text);flex-shrink:0;margin-left:8px;}
.cc-summary-row.from-prev span:first-child{color:var(--text3);}
.cc-summary-total{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(108,63,197,.07);font-size:12px;font-weight:800;color:var(--purple);}
.cc-billing-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-left:4px;}
.cc-billing-tag.current{background:rgba(16,185,129,.12);color:#059669;}
.cc-billing-tag.prev{background:rgba(245,158,11,.12);color:#b45309;}

/* ===== FIRST-RUN / EMPTY STATE ===== */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;height:100%;}
.empty-icon{font-size:56px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(108,63,197,.2));}
.empty-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px;}
.empty-desc{font-size:13px;color:var(--text3);font-weight:500;line-height:1.6;margin-bottom:28px;max-width:280px;}
.empty-import-btn{background:var(--grad);color:#fff;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 6px 20px rgba(108,63,197,.4);display:flex;align-items:center;gap:8px;margin-bottom:12px;width:100%;max-width:280px;justify-content:center;}
.empty-import-btn:active{opacity:.85;}
.empty-skip-btn{background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:14px;padding:12px 28px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;width:100%;max-width:280px;}
.empty-skip-btn:active{background:var(--surface2);}

/* ===== PWA install banner ===== */
.pwa-banner{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2);font-weight:600;flex-shrink:0;}
.pwa-banner-close{margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3);line-height:1;}
.pwa-install-btn{background:var(--grad);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap;}
</style>
</head>
<body>
<div class="app" id="app"></div>
<input type="file" id="importFileInput" accept=".json" style="display:none"/>

<script>
// =====================================================================
// PWA SERVICE WORKER REGISTRATION
// =====================================================================
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

// =====================================================================
// PWA INSTALL PROMPT
// =====================================================================
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  // Show install banner after render
  setTimeout(showInstallBanner,1000);
});

function showInstallBanner(){
  if(!deferredPrompt)return;
  if(document.getElementById('pwaBanner'))return;
  const banner=document.createElement('div');
  banner.id='pwaBanner';
  banner.className='pwa-banner';
  banner.innerHTML=`<span>📱</span><span>Add Budget Tracker to your home screen</span><button class="pwa-install-btn" id="pwaInstallBtn">Install</button><button class="pwa-banner-close" id="pwaBannerClose">×</button>`;
  document.querySelector('.app').appendChild(banner);
  document.getElementById('pwaInstallBtn').addEventListener('click',async()=>{
    if(!deferredPrompt)return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt=null;
    banner.remove();
  });
  document.getElementById('pwaBannerClose').addEventListener('click',()=>banner.remove());
}

// =====================================================================
// APP DATA
// =====================================================================
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const SHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const BANKS=["Cash","BPI","RCBC","UB","Maya","Maribank"];

function getCurrentMonthIndex(){return new Date().getMonth();}
function getCurrentYear(){return new Date().getFullYear();}

// Empty defaults — no personal data hardcoded
const EMPTY_YEAR_DATA={
  items15:[],
  items30:[],
  installments:[],
  income15:0,
  income30:0
};

const DEFAULT_CC_SETTINGS={
  BPI: {cutoff:1,  minPayPct:0.05, minPayFlat:500},
  RCBC:{cutoff:28, minPayPct:0.05, minPayFlat:500},
  UB:  {cutoff:21, minPayPct:0.05, minPayFlat:500},
};

let state={
  month:getCurrentMonthIndex(),
  year:getCurrentYear(),
  view:"dashboard",
  yearData:{},
  subscriptions:[],
  paid:{},
  editCell:null,
  hideIncome:false,
  modal:null,
  settingsOpen:false,
  ccSettings:JSON.parse(JSON.stringify(DEFAULT_CC_SETTINGS)),
  hasData:false  // tracks whether user has imported / added data
};

function getYearData(year){
  const y=String(year);
  if(!state.yearData[y]){
    state.yearData[y]=JSON.parse(JSON.stringify(EMPTY_YEAR_DATA));
  }
  return state.yearData[y];
}

function save(){try{localStorage.setItem("bph4",JSON.stringify(state));}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem("bph4");
    if(d){
      const p=JSON.parse(d);
      Object.assign(state,p);
      // If any year has items, mark hasData
      if(!state.hasData){
        state.hasData=Object.values(state.yearData||{}).some(yd=>
          (yd.items15&&yd.items15.length>0)||(yd.items30&&yd.items30.length>0)||(yd.installments&&yd.installments.length>0)
        )||((state.subscriptions||[]).length>0);
      }
    }
    getYearData(state.year);
  }catch(e){}
}
load();

// =====================================================================
// HELPERS
// =====================================================================
const php=(n)=>n===0?"—":"₱"+Math.abs(n).toLocaleString("en-PH",{minimumFractionDigits:2,maximumFractionDigits:2});
const bankColor=(b)=>({Cash:"#64748b",BPI:"#b91c1c",RCBC:"#87CEEB",UB:"#FFA500",Maya:"#00FF00",Maribank:"#FFD580"}[b]||"#64748b");
const uid=()=>Math.random().toString(36).slice(2,8);

function totals(){
  const mi=state.month;
  const yd=getYearData(state.year);
  const t15=(yd.items15||[]).reduce((s,i)=>s+(i.amounts[mi]||0),0);
  const t30=(yd.items30||[]).reduce((s,i)=>s+(i.amounts[mi]||0),0);
  const tInst=(yd.installments||[]).reduce((s,i)=>s+(i.amounts[mi]||0),0);
  const tSubs=(state.subscriptions||[]).reduce((s,i)=>s+i.monthlyAmount,0);
  const rem15=yd.income15-t15;
  const rem30=yd.income30-t30-tInst-tSubs;
  const totalExp=t15+t30+tInst+tSubs;
  const totalInc=yd.income15+yd.income30;
  return{t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings:totalInc-totalExp};
}

function bankTotals(){
  const mi=state.month;
  const yd=getYearData(state.year);
  const map={};
  [...(yd.items15||[]),...(yd.items30||[]),...(yd.installments||[])].forEach(item=>{
    const b=item.bank||"Cash";if(!map[b])map[b]=0;map[b]+=(item.amounts[mi]||0);
  });
  (state.subscriptions||[]).forEach(s=>{if(!map[s.bank])map[s.bank]=0;map[s.bank]+=s.monthlyAmount;});
  return map;
}

function paidKey(id,year,mi){return id+"_"+year+"_"+mi;}
function isPaid(id,mi){return !!(state.paid||{})[paidKey(id,state.year,mi)];}
function togglePaid(id,mi){const k=paidKey(id,state.year,mi);if(!state.paid)state.paid={};state.paid[k]=!state.paid[k];save();render();}
function paidCount(items,mi){return (items||[]).filter(i=>isPaid(i.id,mi)&&(i.amounts?i.amounts[mi]:i.monthlyAmount)>0).length;}
function activeCount(items,mi){return (items||[]).filter(i=>(i.amounts?i.amounts[mi]:i.monthlyAmount)>0).length;}

function updateAmt(list,id,mi,val){
  const idx=(list||[]).findIndex(x=>x.id===id);
  if(idx===-1)return;
  list[idx].amounts[mi]=parseFloat(val)||0;
  save();render();
}

const CARD_ITEM_MAP={"UB":"h6","RCBC":"h7","BPI":"h8"};

function getCCSettings(){
  if(!state.ccSettings)state.ccSettings=JSON.parse(JSON.stringify(DEFAULT_CC_SETTINGS));
  return state.ccSettings;
}

function chargeBillingOffset(bank,chargeDay){
  const s=getCCSettings()[bank];
  if(!s)return 0;
  return chargeDay>s.cutoff?1:0;
}

function cardChargesDetail(bank,mi){
  const yd=getYearData(state.year);
  const s=getCCSettings()[bank];
  if(!s)return{currentItems:[],prevItems:[],total:0};
  const cutoff=s.cutoff;
  const prevMi=(mi+11)%12;
  const currentItems=[];
  const prevItems=[];
  (yd.installments||[]).filter(i=>(i.bank||"BPI")===bank).forEach(inst=>{
    const cd=inst.chargeDay||0;
    if(!cd||cd<=cutoff){const amt=inst.amounts[mi]||0;if(amt>0)currentItems.push({name:inst.name,amount:amt,type:"installment",chargeDay:cd||null});}
    else{const amt=inst.amounts[prevMi]||0;if(amt>0)prevItems.push({name:inst.name,amount:amt,type:"installment",chargeDay:cd,fromMonth:prevMi});}
  });
  (state.subscriptions||[]).filter(sub=>sub.bank===bank).forEach(sub=>{
    if(sub.monthlyAmount>0)currentItems.push({name:sub.name,amount:sub.monthlyAmount,type:"subscription",chargeDay:null});
  });
  const total=currentItems.reduce((s,i)=>s+i.amount,0)+prevItems.reduce((s,i)=>s+i.amount,0);
  return{currentItems,prevItems,total};
}

function cardChargesForMonth(bank,mi){return cardChargesDetail(bank,mi).total;}

function calcMinPayment(bank,totalCharges){
  const s=getCCSettings()[bank];
  if(!s||totalCharges<=0)return 0;
  return Math.max(s.minPayFlat,totalCharges*s.minPayPct);
}

function getCardNote(item,mi){
  if(!CARD_ITEM_MAP[item.name])return null;
  const bank=item.name;
  const detail=cardChargesDetail(bank,mi);
  if(detail.total===0)return null;
  const minPay=calcMinPayment(bank,detail.total);
  return{charges:detail.total,minPay,detail};
}

function autoCalcCCAmounts(){
  const CC_CARDS=["UB","RCBC","BPI"];
  const yd=getYearData(state.year);
  const allItems=[...(yd.items15||[]),...(yd.items30||[])];
  CC_CARDS.forEach(bank=>{
    const item=allItems.find(i=>i.name===bank&&CARD_ITEM_MAP[bank]);
    if(!item)return;
    for(let mi=0;mi<12;mi++){
      const detail=cardChargesDetail(bank,mi);
      if(detail.total>0){
        const cfg=getCCSettings()[bank];
        const minFlat=cfg?cfg.minPayFlat:0;
        item.amounts[mi]=parseFloat((detail.total+minFlat).toFixed(2));
        item._autoCalc=true;
      }
    }
  });
}

// =====================================================================
// MODAL HELPERS
// =====================================================================
function openAdd(listKey){state.modal={type:"add",listKey,amtMode:"different"};render();}
function openEdit(listKey,id){
  const yd=getYearData(state.year);
  const list=listKey==="subscriptions"?state.subscriptions:yd[listKey];
  const item=(list||[]).find(x=>x.id===id);
  if(!item)return;
  const amtMode=item.consistent?"consistent":"different";
  state.modal={type:"edit",listKey,item:JSON.parse(JSON.stringify(item)),amtMode};render();
}
function closeModal(){state.modal=null;render();}
function setAmtMode(mode){if(state.modal){state.modal.amtMode=mode;render();}}

function saveModal(){
  const m=state.modal;
  if(!m)return;
  const yd=getYearData(state.year);
  if(m.listKey==="subscriptions"){
    const name=document.getElementById("mName")?.value.trim()||"";
    const bank=document.getElementById("mBank")?.value||"Cash";
    const amt=parseFloat(document.getElementById("mAmt")?.value)||0;
    if(!name)return;
    if(!state.subscriptions)state.subscriptions=[];
    if(m.type==="add"){state.subscriptions.push({id:"s"+uid(),name,bank,monthlyAmount:amt});}
    else{const idx=state.subscriptions.findIndex(x=>x.id===m.item.id);if(idx>-1)Object.assign(state.subscriptions[idx],{name,bank,monthlyAmount:amt});}
  } else {
    const name=document.getElementById("mName")?.value.trim()||"";
    const bank=document.getElementById("mBank")?.value||"Cash";
    const dueDate=document.getElementById("mDue")?.value||"";
    const via=document.getElementById("mVia")?.value||"";
    const chargeDay=parseInt(document.getElementById("mChargeDay")?.value)||null;
    if(!name)return;
    const isConsistent=(m.amtMode==="consistent");
    let amounts=new Array(12).fill(0);
    const CC_BANKS=["BPI","RCBC","UB"];
    if(isConsistent){
      const v=parseFloat(document.getElementById("mConsistentAmt")?.value)||0;
      if(CC_BANKS.includes(bank)&&chargeDay){
        amounts=new Array(12).fill(0);
        for(let mi2=0;mi2<12;mi2++){const offset=chargeBillingOffset(bank,chargeDay);const targetMi=(mi2+offset)%12;amounts[targetMi]=(amounts[targetMi]||0)+v;}
      } else {amounts=new Array(12).fill(v);}
    } else {
      const amtInputs=document.querySelectorAll(".m-month-amt");
      amtInputs.forEach(inp=>{amounts[+inp.dataset.mi]=parseFloat(inp.value)||0;});
      if(CC_BANKS.includes(bank)&&chargeDay){
        const offset=chargeBillingOffset(bank,chargeDay);
        if(offset>0){const shifted=new Array(12).fill(0);for(let mi2=0;mi2<12;mi2++){const targetMi=(mi2+offset)%12;shifted[targetMi]=(shifted[targetMi]||0)+(amounts[mi2]||0);}amounts=shifted;}
      }
    }
    if(!yd[m.listKey])yd[m.listKey]=[];
    if(m.type==="add"){
      yd[m.listKey].push({id:(m.listKey==="installments"?"i":"h")+uid(),name,bank,dueDate,via,chargeDay,amounts,highlight:"",consistent:isConsistent});
    } else {
      const idx=yd[m.listKey].findIndex(x=>x.id===m.item.id);
      if(idx>-1)Object.assign(yd[m.listKey][idx],{name,bank,dueDate,via,chargeDay,amounts,consistent:isConsistent});
    }
  }
  state.hasData=true;
  state.modal=null;save();render();
}

function buildModal(){
  const m=state.modal;
  if(!m)return"";
  const isSub=(m.listKey==="subscriptions");
  const isInst=(m.listKey==="installments");
  const item=m.item||{};
  const title=m.type==="add"?(isSub?"Add Subscription":isInst?"Add Installment":"Add Expense"):(isSub?"Edit Subscription":isInst?"Edit Installment":"Edit Expense");
  const amtMode=m.amtMode||"different";
  let bodyHtml="";
  if(isSub){
    bodyHtml=`
      <div class="form-group"><label class="form-label">Name</label><input id="mName" class="form-input" type="text" value="${item.name||""}" placeholder="e.g. Netflix"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Bank</label><select id="mBank" class="form-select">${BANKS.map(b=>`<option${b===(item.bank||"Cash")?" selected":""}>${b}</option>`).join("")}</select></div>
        <div class="form-group"><label class="form-label">Monthly (₱)</label><input id="mAmt" class="form-input" type="number" inputmode="decimal" value="${item.monthlyAmount||0}"/></div>
      </div>`;
  } else {
    const amounts=item.amounts||new Array(12).fill(0);
    const consistentVal=amounts.find(a=>a>0)||0;
    bodyHtml=`
      <div class="form-group"><label class="form-label">Name</label><input id="mName" class="form-input" type="text" value="${item.name||""}" placeholder="Expense name"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Bank / Source</label><select id="mBank" class="form-select">${BANKS.map(b=>`<option${b===(item.bank||"Cash")?" selected":""}>${b}</option>`).join("")}</select></div>
        <div class="form-group"><label class="form-label">Due Date</label><input id="mDue" class="form-input" type="text" value="${item.dueDate||""}" placeholder="e.g. 10th"/></div>
      </div>
      <div class="form-group"><label class="form-label">Via (optional)</label><input id="mVia" class="form-input" type="text" value="${item.via||""}" placeholder="e.g. Maribank"/></div>
      <div id="ccCutoffNote" style="display:none;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#92400e;font-weight:600;"></div>
      <div id="chargeDayGroup" class="form-group" style="display:none;">
        <label class="form-label">Charge Date (Day of Month)</label>
        <input id="mChargeDay" class="form-input" type="number" min="1" max="31" inputmode="numeric" value="${item.chargeDay||new Date().getDate()}" style="text-align:center;font-size:16px;font-weight:700;color:var(--purple)"/>
        <div style="font-size:10px;color:var(--text3);margin-top:4px;">Used to determine if this charge falls within the cutoff and which month it bills to.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Amount Type</label>
        <div class="amt-mode-row">
          <button class="amt-mode-btn${amtMode==="consistent"?" active":""}" onclick="setAmtMode('consistent')">📌 Same Every Month</button>
          <button class="amt-mode-btn${amtMode==="different"?" active":""}" onclick="setAmtMode('different')">📅 Different Per Month</button>
        </div>
        ${amtMode==="consistent"
          ?`<div><label class="form-label" style="margin-top:6px">Monthly Amount (₱)</label><input id="mConsistentAmt" class="form-input" type="number" inputmode="decimal" value="${consistentVal}" style="font-size:18px;font-weight:700;text-align:center;color:var(--purple)"/><div style="font-size:11px;color:var(--text3);margin-top:5px;text-align:center">This amount will apply to all 12 months</div></div>`
          :`<div class="months-grid">${SHORT.map((s,i)=>`<div><div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:3px;font-weight:700">${s}</div><input class="form-input m-month-amt" data-mi="${i}" type="number" inputmode="decimal" value="${amounts[i]||0}" style="padding:5px;text-align:center;font-size:12px;font-weight:700"/></div>`).join("")}</div>`
        }
      </div>`;
  }
  return`
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">${title}</div>
      ${bodyHtml}
      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>`;
}

// RENDER

function render(){
  autoCalcCCAmounts();
  document.getElementById("app").innerHTML=buildApp();
  attachEvents();
  const activeChip=document.querySelector(".month-chip.active");
  if(activeChip)activeChip.scrollIntoView({inline:"center",behavior:"smooth"});
}

function buildYearSelector(){
  const currentYear=getCurrentYear();
  const years=[currentYear-1,currentYear,currentYear+1,currentYear+2];
  return`<select class="year-select" id="yearSelect">${years.map(y=>`<option value="${y}"${y===state.year?" selected":""}>${y}</option>`).join("")}</select>`;
}

function buildSettingsModal(){
  if(!state.settingsOpen)return"";
  return`
  <div class="settings-overlay" id="settingsOverlay">
    <div class="settings-panel">
      <div class="settings-header">Settings</div>
      <div class="settings-item" id="settingsImport"><span class="settings-item-icon">📥</span><span class="settings-item-label">Import Data</span></div>
      <div class="settings-item" id="settingsExport"><span class="settings-item-icon">📤</span><span class="settings-item-label">Export Data</span></div>
      <div class="settings-item" id="settingsCC"><span class="settings-item-icon">💳</span><span class="settings-item-label">CC Settings</span></div>
      <div class="settings-item" id="settingsReset" style="color:var(--red);"><span class="settings-item-icon">🗑️</span><span class="settings-item-label" style="color:var(--red);">Clear All Data</span></div>
    </div>
  </div>`;
}

function buildApp(){
  const {t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings}=totals();
  const mi=state.month;
  const yd=getYearData(state.year);
  const views=[["dashboard","Overview"],["15th","15th"],["30th","30th"],["installments","Installs"],["subscriptions","Subs"]];
  return`
  ${buildSettingsModal()}
  <div class="header">
    <div class="header-top">
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="logo">Expenses</div>
        ${buildYearSelector()}
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btnHideIncome">${state.hideIncome?"👁 Show":"🙈 Hide"}</button>
        <button class="settings-btn" id="btnSettings" aria-label="Settings">⚙️</button>
      </div>
    </div>
    <div class="income-row${state.hideIncome?" hidden":""}">
      <div class="income-box"><div class="income-label">15th Salary</div><input class="income-input" id="inc15" type="number" value="${yd.income15}" inputmode="numeric" placeholder="0"/></div>
      <div class="income-box"><div class="income-label">30th Salary</div><input class="income-input" id="inc30" type="number" value="${yd.income30}" inputmode="numeric" placeholder="0"/></div>
    </div>
  </div>
  <div class="month-bar"><div class="month-bar-inner">${SHORT.map((m,i)=>`<button class="month-chip${i===mi?" active":""}" data-month="${i}">${m}</button>`).join("")}</div></div>
  <div class="nav">${views.map(([k,l])=>`<button class="nav-btn${state.view===k?" active":""}" data-view="${k}">${l}</button>`).join("")}</div>
  <div class="content">${buildView(mi,t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings)}</div>
  ${buildModal()}
  `;
}

function buildView(mi,t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings){
  // Show empty state if no data yet
  if(!state.hasData&&state.view==="dashboard"){return buildEmptyState();}
  const yd=getYearData(state.year);
  switch(state.view){
    case"dashboard":return buildDashboard(mi,t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings);
    case"15th":return buildPayroll("15th","items15",yd.items15||[],yd.income15,t15,rem15,mi);
    case"30th":return buildPayroll("30th","items30",yd.items30||[],yd.income30,t30,rem30,mi);
    case"installments":return buildInstallments(mi,tInst);
    case"subscriptions":return buildSubscriptions(tSubs);
    case"ccsettings":return buildCCSettings(mi);
    default:return"";
  }
}

function buildEmptyState(){
  return`
  <div class="empty-state">
    <div class="empty-icon">₱</div>
    <div class="empty-title">Welcome to Budget Tracker</div>
    <div class="empty-desc">Import your personal budget data to get started, or start fresh by adding expenses manually.</div>
    <button class="empty-import-btn" id="emptyImportBtn">📥 Import Budget Tracker-data.json</button>
    <button class="empty-skip-btn" id="emptySkipBtn">Start Fresh (No Data)</button>
  </div>`;
}

function buildDashboard(mi,t15,t30,tInst,tSubs,rem15,rem30,totalExp,totalInc,netSavings){
  const bt=bankTotals();
  const yd=getYearData(state.year);
  const savingsPct=totalInc>0?Math.round((netSavings/totalInc)*100):0;
  return`
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Income</div><div class="stat-value" style="color:var(--green)">${state.hideIncome?"₱ ••••••":php(totalInc)}</div><div class="stat-sub">15th + 30th</div></div>
    <div class="stat-card"><div class="stat-label">Total Expenses</div><div class="stat-value" style="color:var(--red)">${php(totalExp)}</div><div class="stat-sub">${MONTHS[mi]} ${state.year}</div></div>
  </div>
  <div class="stat-grid three">
    <div class="stat-card"><div class="stat-label">Net</div><div class="stat-value" style="color:${netSavings>=0?"var(--green)":"var(--red)"}">${state.hideIncome?"₱ ••••":php(Math.abs(netSavings))}</div><div class="stat-sub">${netSavings>=0?`Saved ${savingsPct}% 🎉`:"Over ⚠️"}</div></div>
    <div class="stat-card"><div class="stat-label">15th Left</div><div class="stat-value" style="color:${rem15>=0?"var(--blue)":"var(--red)"}">${state.hideIncome?"••••":php(Math.abs(rem15))}</div><div class="stat-sub">${rem15>=0?"left":"over"}</div></div>
    <div class="stat-card"><div class="stat-label">30th Left</div><div class="stat-value" style="color:${rem30>=0?"var(--blue)":"var(--red)"}">${state.hideIncome?"••••":php(Math.abs(rem30))}</div><div class="stat-sub">${rem30>=0?"left":"over"}</div></div>
  </div>
  <div class="card">
    <div class="card-title">Budget Overview — ${MONTHS[mi]} ${state.year}</div>
    ${[["15th Payroll",t15,yd.income15,"#6c3fc5"],["30th Payroll",t30,yd.income30,"#8b5cf6"],["Installments",tInst,yd.income30,"#f59e0b"],["Subscriptions",tSubs,yd.income30,"#06b6d4"]].map(([lbl,spent,tot,col])=>{
      const pct=Math.min(100,tot>0?(spent/tot)*100:0);
      const over=spent>tot;
      return`<div class="budget-bar"><div class="budget-bar-label"><span>${lbl}</span><span style="color:${over?"var(--red)":"var(--text)"}">${php(spent)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${over?"var(--red)":col}"></div></div></div>`;
    }).join("")}

function handleImportFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(!confirm(`Import data from ${file.name}?\nThis will replace your current budget data.`)){return;}
      if(d.version===2&&d.yearData){
        state.yearData=d.yearData;
        state.subscriptions=d.subscriptions||state.subscriptions;
        state.paid=d.paid||{};
        if(d.ccSettings)state.ccSettings=d.ccSettings;
      } else if(d.items15&&d.items30){
        const y=String(state.year);
        state.yearData[y]={items15:d.items15,items30:d.items30,installments:d.installments||[],income15:d.income15||0,income30:d.income30||0};
        state.subscriptions=d.subscriptions||state.subscriptions;
        state.paid=d.paid||{};
      } else {throw new Error("Invalid format");}
      state.hasData=true;
      save();render();
    }catch(err){alert("Failed to import: "+err.message);}
  };
  reader.readAsText(file);
}

function attachEvents(){
  const importInput=document.getElementById("importFileInput");

  // Empty state buttons
  const emptyImport=document.getElementById("emptyImportBtn");
  if(emptyImport)emptyImport.addEventListener("click",()=>importInput&&importInput.click());

  const emptySkip=document.getElementById("emptySkipBtn");
  if(emptySkip)emptySkip.addEventListener("click",()=>{state.hasData=true;save();render();});

  // Year selector
  const ySel=document.getElementById("yearSelect");
  if(ySel)ySel.addEventListener("change",e=>{state.year=parseInt(e.target.value);getYearData(state.year);state.editCell=null;save();render();});

  // CC summary toggles
  document.querySelectorAll("[data-cctoggle]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const id=btn.dataset.cctoggle;
      const panel=document.getElementById("ccpanel_"+id);
      const chev=document.getElementById("chev_"+id);
      if(!panel)return;
      const isOpen=panel.classList.toggle("open");
      if(chev)chev.style.transform=isOpen?"rotate(180deg)":"";
    });
  });

  document.querySelectorAll("[data-month]").forEach(el=>el.addEventListener("click",()=>{state.month=+el.dataset.month;state.editCell=null;state.settingsOpen=false;save();render();}));
  document.querySelectorAll("[data-view]").forEach(el=>el.addEventListener("click",()=>{state.view=el.dataset.view;state.editCell=null;state.settingsOpen=false;save();render();}));

  const i15=document.getElementById("inc15");
  if(i15)i15.addEventListener("change",e=>{getYearData(state.year).income15=parseFloat(e.target.value)||0;save();render();});
  const i30=document.getElementById("inc30");
  if(i30)i30.addEventListener("change",e=>{getYearData(state.year).income30=parseFloat(e.target.value)||0;save();render();});

  const iEdit=document.getElementById("incEdit");
  if(iEdit)iEdit.addEventListener("change",e=>{
    const yd=getYearData(state.year);
    if(e.target.dataset.which==="15th")yd.income15=parseFloat(e.target.value)||0;
    else yd.income30=parseFloat(e.target.value)||0;
    save();render();
  });

  const btnSettings=document.getElementById("btnSettings");
  if(btnSettings)btnSettings.addEventListener("click",()=>{state.settingsOpen=!state.settingsOpen;render();});
  const settingsOverlay=document.getElementById("settingsOverlay");
  if(settingsOverlay)settingsOverlay.addEventListener("click",e=>{if(e.target===settingsOverlay){state.settingsOpen=false;render();}});

  const btnHideIncome=document.getElementById("btnHideIncome");
  if(btnHideIncome)btnHideIncome.addEventListener("click",()=>{state.hideIncome=!state.hideIncome;save();render();});

  // Settings items
  const sImport=document.getElementById("settingsImport");
  if(sImport)sImport.addEventListener("click",()=>{state.settingsOpen=false;render();setTimeout(()=>importInput&&importInput.click(),50);});

  const sExport=document.getElementById("settingsExport");
  if(sExport)sExport.addEventListener("click",()=>{
    state.settingsOpen=false;render();
    const exportData={version:2,exportedAt:new Date().toISOString(),yearData:state.yearData,subscriptions:state.subscriptions,paid:state.paid,ccSettings:state.ccSettings};
    const blob=new Blob([JSON.stringify(exportData,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;
    const d=new Date();
    a.download=`Budget Tracker_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}.json`;
    a.click();URL.revokeObjectURL(url);
  });

  const sCC=document.getElementById("settingsCC");
  if(sCC)sCC.addEventListener("click",()=>{state.settingsOpen=false;state.view="ccsettings";save();render();});

  const sReset=document.getElementById("settingsReset");
  if(sReset)sReset.addEventListener("click",()=>{
    if(!confirm("Clear ALL data and reset?\n\nThis cannot be undone. Export first if you want a backup."))return;
    localStorage.removeItem("bph4");
    state={month:getCurrentMonthIndex(),year:getCurrentYear(),view:"dashboard",yearData:{},subscriptions:[],paid:{},editCell:null,hideIncome:false,modal:null,settingsOpen:false,ccSettings:JSON.parse(JSON.stringify(DEFAULT_CC_SETTINGS)),hasData:false};
    getYearData(state.year);
    save();render();
  });

  // Import file input
  if(importInput)importInput.addEventListener("change",e=>{
    const file=e.target.files[0];
    if(file)handleImportFile(file);
    importInput.value="";
  });

  document.querySelectorAll("[data-paid]").forEach(el=>{
    el.addEventListener("click",()=>togglePaid(el.dataset.paid,+el.dataset.mi));
  });

  document.querySelectorAll("[data-editcell]").forEach(el=>el.addEventListener("click",()=>{
    state.editCell=el.dataset.editcell;render();
    setTimeout(()=>{
      const parts=el.dataset.editcell.split("_");
      const inp=document.getElementById("editInput_"+parts[0]);
      if(inp){inp.focus();inp.select();}
    },50);
  }));

  document.querySelectorAll(".amt-edit").forEach(inp=>{
    const commit=()=>{
      const {id,list,mi}=inp.dataset;
      const yd=getYearData(state.year);
      const listMap={"items15":yd.items15,"items30":yd.items30,"installments":yd.installments};
      updateAmt(listMap[list]||yd.items15,id,+mi,inp.value);
      state.editCell=null;save();render();
    };
    inp.addEventListener("blur",commit);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){state.editCell=null;render();}});
  });

  document.querySelectorAll("[data-sub]").forEach(inp=>{
    inp.addEventListener("change",e=>{
      const idx=(state.subscriptions||[]).findIndex(s=>s.id===e.target.dataset.sub);
      if(idx>-1){state.subscriptions[idx].monthlyAmount=parseFloat(e.target.value)||0;save();render();}
    });
  });

  document.querySelectorAll("[data-addlist]").forEach(el=>el.addEventListener("click",()=>openAdd(el.dataset.addlist)));
  document.querySelectorAll("[data-edit]").forEach(el=>el.addEventListener("click",()=>openEdit(el.dataset.listkey,el.dataset.edit)));
  document.querySelectorAll("[data-delete]").forEach(el=>el.addEventListener("click",()=>{
    if(confirm("Delete this item?")){
      const lk=el.dataset.listkey;
      const id=el.dataset.delete;
      if(lk==="subscriptions"){state.subscriptions=(state.subscriptions||[]).filter(x=>x.id!==id);}
      else{const yd=getYearData(state.year);yd[lk]=(yd[lk]||[]).filter(x=>x.id!==id);}
      save();render();
    }
  }));

  const mSave=document.getElementById("modalSave");if(mSave)mSave.addEventListener("click",saveModal);
  const mCancel=document.getElementById("modalCancel");if(mCancel)mCancel.addEventListener("click",closeModal);
  const mOverlay=document.getElementById("modalOverlay");
  if(mOverlay)mOverlay.addEventListener("click",e=>{if(e.target===mOverlay)closeModal();});

  function updateChargeDayVisibility(){
    const bankSel=document.getElementById("mBank");
    const cdGroup=document.getElementById("chargeDayGroup");
    const cdNote=document.getElementById("ccCutoffNote");
    if(!bankSel||!cdGroup)return;
    const CC_BANKS=["BPI","RCBC","UB"];
    const isCC=CC_BANKS.includes(bankSel.value);
    cdGroup.style.display=isCC?"block":"none";
    if(isCC&&cdNote){
      const cfg=getCCSettings()[bankSel.value];
      const chargeDay=parseInt(document.getElementById("mChargeDay")?.value)||new Date().getDate();
      const offset=chargeBillingOffset(bankSel.value,chargeDay);
      const cutoffOrd=cfg.cutoff+(cfg.cutoff===1?"st":cfg.cutoff===2?"nd":cfg.cutoff===3?"rd":"th");
      cdNote.style.display="block";
      cdNote.innerHTML=`💳 <strong>${bankSel.value}</strong> cutoff: <strong>${cutoffOrd}</strong> · Charge day <strong>${chargeDay}</strong> → bills to <strong>${offset===0?"current month":"next month"}</strong>`;
    } else if(cdNote){cdNote.style.display="none";}
  }
  const mBankSel=document.getElementById("mBank");
  if(mBankSel){mBankSel.addEventListener("change",updateChargeDayVisibility);updateChargeDayVisibility();}
  const mChgDay=document.getElementById("mChargeDay");
  if(mChgDay)mChgDay.addEventListener("input",updateChargeDayVisibility);

  document.querySelectorAll("[data-ccsetting]").forEach(inp=>{
    const commit=()=>{
      const bank=inp.dataset.ccsetting;
      const field=inp.dataset.field;
      const s=getCCSettings();
      if(!s[bank])return;
      let val=parseFloat(inp.value)||0;
      if(field==="cutoff")val=Math.max(1,Math.min(31,Math.round(val)));
      if(field==="minPayPct")val=Math.max(0,Math.min(100,val))/100;
      if(field==="minPayFlat")val=Math.max(0,val);
      s[bank][field]=val;
      state.ccSettings=s;
      save();render();
    };
    inp.addEventListener("change",commit);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")commit();});
  });
}

render();
</script>
</body>
</html>
